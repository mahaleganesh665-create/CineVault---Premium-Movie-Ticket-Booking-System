<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Seats | CineVault</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">

    <style>
        .seat-header {
            padding: 80px 0 20px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-light);
            position: sticky;
            top: 0; z-index: 100;
        }

        .booking-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-btn {
            color: var(--text-secondary);
            font-size: 1.2rem;
            display: flex; align-items: center; gap: 0.5rem;
            cursor: pointer;
        }

        .back-btn:hover { color: white; }

        .screen-container {
            margin: 4rem auto 3rem;
            text-align: center;
            max-width: 800px;
        }

        .screen {
            height: 80px;
            width: 100%;
            background: linear-gradient(to bottom, rgba(59, 130, 246, 0.4), transparent);
            transform: perspective(400px) rotateX(-20deg);
            box-shadow: 0 15px 30px rgba(59, 130, 246, 0.3);
            border-top: 3px solid var(--accent-blue);
            border-radius: 5px;
            margin-bottom: 1rem;
        }

        .seat-map-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 1rem 120px;
            overflow-x: auto;
        }

        .seat-row {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 0.8rem;
            gap: 0.5rem;
        }

        .row-label {
            color: var(--text-secondary);
            font-weight: 600;
            width: 30px;
            text-align: right;
            margin-right: 1rem;
        }

        .seat {
            width: 30px;
            height: 30px;
            background: var(--bg-glass-light);
            border: 1px solid var(--border-light);
            border-radius: 6px 6px 2px 2px;
            cursor: pointer;
            position: relative;
            display: flex;
            align-items: center; justify-content: center;
            font-size: 0.7rem;
            color: transparent;
        }

        .seat::after {
            content: '';
            position: absolute;
            bottom: -4px; left: 10%; width: 80%; height: 4px;
            background: var(--border-light);
            border-radius: 2px;
            transition: all var(--transition-fast);
        }

        .seat:hover:not(.occupied) {
            border-color: var(--text-primary);
            color: var(--text-primary);
        }
        .seat:hover:not(.occupied)::after { background: var(--text-primary); }

        .seat.selected {
            background: var(--accent-red);
            border-color: var(--accent-red);
            color: white;
            box-shadow: 0 0 10px rgba(229, 9, 20, 0.5);
        }
        .seat.selected::after { background: #ff4d4d; }

        .seat.occupied {
            background: #222;
            border-color: #333;
            cursor: not-allowed;
            opacity: 0.5;
        }
        .seat.occupied::after { background: #111; }

        /* Categories */
        .cat-premium .seat { border-color: var(--accent-blue); }
        .cat-premium .seat::after { background: rgba(59, 130, 246, 0.5); }
        .cat-vip .seat { border-color: var(--accent-gold); }
        .cat-vip .seat::after { background: rgba(212, 175, 55, 0.5); }

        .aisle { width: 30px; }

        /* Legends */
        .legends {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 3rem;
            flex-wrap: wrap;
        }

        .legend-item { display: flex; align-items: center; gap: 0.5rem; font-size: 0.9rem; color: var(--text-secondary); }
        .legend-box { width: 20px; height: 20px; border-radius: 4px; border: 1px solid; }

        /* Sticky Footer */
        .booking-footer {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            background: rgba(5,5,5,0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--border-light);
            padding: 1rem 0;
            z-index: 100;
            transform: translateY(100%);
            transition: transform var(--transition-normal);
        }

        .booking-footer.active { transform: translateY(0); }

        .footer-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 2rem;
            gap: 2rem;
        }

        .selected-seats-info { font-size: 1.1rem; }
        .total-price { font-size: 1.8rem; font-weight: 700; color: white; display: flex; align-items: center; gap: 0.5rem; }
        .total-price span { font-size: 1rem; color: var(--text-secondary); font-weight: 400; }
        
        .cat-title {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.8rem;
            letter-spacing: 2px;
            margin: 2rem 0 1rem;
            text-transform: uppercase;
        }
        .cat-title span { color: white; font-weight: bold; }
    </style>
</head>
<body class="page-enter">

    <header class="seat-header">
        <div class="container booking-info" id="bookingMeta">
            <div class="back-btn" onclick="history.back()"><i class="fa-solid fa-arrow-left"></i> <span>Back</span></div>
            <div style="text-align: right;">
                <h2 id="metaTitle" style="font-size: 1.2rem; margin-bottom: 0.2rem;">Movie Title</h2>
                <p id="metaDetails" class="text-secondary" style="font-size: 0.9rem;">Theatre | Date | Time</p>
            </div>
        </div>
    </header>

    <div class="screen-container reveal stagger-1">
        <div class="screen"></div>
        <p class="text-secondary" style="letter-spacing: 5px; font-size: 0.9rem; text-transform: uppercase;">All eyes this way</p>
    </div>

    <div class="legends reveal stagger-2">
        <div class="legend-item"><div class="legend-box" style="background: var(--bg-glass-light); border-color: var(--border-light);"></div> Available</div>
        <div class="legend-item"><div class="legend-box" style="background: var(--accent-red); border-color: var(--accent-red);"></div> Selected</div>
        <div class="legend-item"><div class="legend-box" style="background: #222; border-color: #333;"></div> Occupied</div>
        <div class="legend-item"><div class="legend-box" style="border-color: var(--accent-gold);"></div> VIP</div>
        <div class="legend-item"><div class="legend-box" style="border-color: var(--accent-blue);"></div> Premium</div>
    </div>

    <div class="seat-map-container reveal stagger-3" id="seatMap">
        <!-- Injected via JS -->
    </div>

    <div class="booking-footer" id="bookingFooter">
        <div class="footer-content">
            <div class="selected-seats-info">
                <div style="color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 0.2rem;">Selected Seats:</div>
                <div id="selectedSeatsLabel" style="font-weight: 600; color: white;">None</div>
            </div>
            
            <div style="display: flex; align-items: center; gap: 2rem;">
                <div>
                    <div style="color: var(--text-secondary); font-size: 0.9rem; text-align: right; margin-bottom: 0.2rem;">Total Amount</div>
                    <div class="total-price"><span>$</span><span id="totalPriceLabel" style="color:white; font-size:1.8rem;">0</span></div>
                </div>
                <button class="btn btn-primary btn-lg" id="proceedBtn">Proceed <i class="fa-solid fa-arrow-right" style="margin-left: 8px;"></i></button>
            </div>
        </div>
    </div>

    <script type="module" src="js/supabase.js"></script>
    <script type="module" src="js/app.js"></script>
    <script type="module" src="js/seat-selection.js"></script>
</body>
</html>
