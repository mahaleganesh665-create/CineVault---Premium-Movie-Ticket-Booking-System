<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookings | CineVault</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">

    <style>
        .page-header {
            padding: 120px 0 40px;
            background: linear-gradient(to bottom, rgba(5,5,5,1), var(--bg-secondary));
            border-bottom: 1px solid var(--border-light);
        }

        .booking-card {
            display: flex;
            background: var(--bg-glass);
            border: 1px solid var(--border-light);
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 2rem;
            transition: all var(--transition-normal);
        }

        .booking-card:hover {
            border-color: var(--accent-blue);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transform: translateY(-5px);
        }

        .b-poster {
            width: 150px;
            object-fit: cover;
        }

        .b-details {
            padding: 1.5rem;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .b-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .b-status {
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .b-info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1.5rem;
        }

        .b-label { color: var(--text-secondary); font-size: 0.8rem; text-transform: uppercase; margin-bottom: 0.2rem; }
        .b-value { font-weight: 500; }

        @media (max-width: 600px) {
            .booking-card { flex-direction: column; }
            .b-poster { width: 100%; height: 200px; }
        }
    </style>
</head>
<body class="page-enter">

    <!-- Navigation -->
    <nav class="navbar scrolled">
        <div class="container nav-container">
            <a href="index.html" class="nav-logo">CINE<span>VAULT</span></a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="movies.html">Movies</a>
                <div id="user-links" style="display: flex; align-items: center; gap: 1.5rem; margin-left: 2rem;">
                    <a href="#" id="logout-btn" class="text-secondary hover-glow">Logout</a>
                </div>
            </div>
        </div>
    </nav>

    <header class="page-header">
        <div class="container">
            <h1 class="text-gradient">My Bookings</h1>
            <p class="text-secondary">View and manage your cinematic experiences.</p>
        </div>
    </header>

    <section class="section">
        <div class="container">
            <div id="bookingsList">
                <!-- Javascript will inject bookings here -->
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom" style="margin-top: 0; padding-top: 1rem;">
                <p>&copy; 2026 CineVault Premium Movie Ticket Booking System.</p>
            </div>
        </div>
    </footer>

    <script type="module" src="js/supabase.js"></script>
    <script type="module" src="js/app.js"></script>
    <script type="module">
        import { supabase, USE_MOCK_DATA } from './js/supabase.js';

        document.addEventListener('DOMContentLoaded', async () => {
            const list = document.getElementById('bookingsList');
            
            if(USE_MOCK_DATA) {
                // Keep the old local storage fallback just in case DB fails during demo
                renderFallback(list);
                return;
            }

            try {
                // Get the current logged in user
                const { data: { session }, error: authError } = await supabase.auth.getSession();
                
                if (!session || !session.user) {
                    list.innerHTML = `
                        <div style="text-align: center; padding: 5rem 0;">
                            <i class="fa-solid fa-lock fa-4x" style="color: var(--text-muted); margin-bottom: 1rem;"></i>
                            <h2 style="font-size: 1.5rem; margin-bottom: 0.5rem;">Log In Required</h2>
                            <p class="text-secondary" style="margin-bottom: 2rem;">Please sign in to view your bookings.</p>
                            <a href="login.html" class="btn btn-primary">Sign In</a>
                        </div>
                    `;
                    return;
                }

                const userId = session.user.id;

                // Fetch bookings from database
                const { data: bookings, error } = await supabase
                    .from('bookings')
                    .select('*')
                    .eq('user_id', userId)
                    .order('created_at', { ascending: false });

                if (error) throw error;

                if (!bookings || bookings.length === 0) {
                    list.innerHTML = `
                        <div style="text-align: center; padding: 5rem 0;">
                            <i class="fa-solid fa-ticket fa-4x" style="color: var(--text-muted); margin-bottom: 1rem;"></i>
                            <h2 style="font-size: 1.5rem; margin-bottom: 0.5rem;">No Bookings Found</h2>
                            <p class="text-secondary" style="margin-bottom: 2rem;">Looks like you haven't booked any movies yet.</p>
                            <a href="movies.html" class="btn btn-primary">Browse Movies</a>
                        </div>
                    `;
                    return;
                }

                let html = '';
                bookings.forEach(b => {
                    const d = new Date(b.show_date);
                    const dateStr = `${d.getDate()} ${d.toLocaleString('default', { month: 'short' })}, ${d.getFullYear()}`;
                    
                    html += `
                        <div class="booking-card reveal active">
                            <div class="b-details">
                                <div class="b-header">
                                    <div>
                                        <h3 style="font-size: 1.4rem; margin-bottom: 0.2rem;">${b.movie_title}</h3>
                                        <p class="text-secondary"><i class="fa-solid fa-location-dot"></i> ${b.theatre_name}</p>
                                    </div>
                                    <div class="b-status">Confirmed</div>
                                </div>
                                
                                <div class="b-info-grid">
                                    <div><div class="b-label">Date</div ><div class="b-value">${dateStr}</div></div>
                                    <div><div class="b-label">Time</div><div class="b-value">${b.show_time}</div></div>
                                    <div><div class="b-label">Seats</div><div class="b-value">${b.seats.join(', ')}</div></div>
                                    <div><div class="b-label">Amount Paid</div><div class="b-value">$${Number(b.total_amount).toFixed(2)}</div></div>
                                    <div><div class="b-label">Booking ID</div><div class="b-value" style="font-family: monospace;">${b.booking_reference}</div></div>
                                </div>
                            </div>
                        </div>
                    `;
                });
                
                list.innerHTML = html;

            } catch (err) {
                console.error("Booking fetch error:", err);
                renderFallback(list); // Fallback to local storage if DB fails
            }
        });

        function renderFallback(list) {
            const finalTicketData = localStorage.getItem('finalTicket');
            if(!finalTicketData) {
                list.innerHTML = `
                    <div style="text-align: center; padding: 5rem 0;">
                        <i class="fa-solid fa-ticket fa-4x" style="color: var(--text-muted); margin-bottom: 1rem;"></i>
                        <h2 style="font-size: 1.5rem; margin-bottom: 0.5rem;">No Bookings Found</h2>
                        <p class="text-secondary" style="margin-bottom: 2rem;">Looks like you haven't booked any movies yet.</p>
                        <a href="movies.html" class="btn btn-primary">Browse Movies</a>
                    </div>
                `;
            } else {
                const data = JSON.parse(finalTicketData);
                const d = new Date(data.date);
                const dateStr = `${d.getDate()} ${d.toLocaleString('default', { month: 'short' })}, ${d.getFullYear()}`;
                list.innerHTML = `
                    <div class="booking-card reveal active">
                        <img src="${data.poster}" alt="Poster" class="b-poster">
                        <div class="b-details">
                            <div class="b-header">
                                <div>
                                    <h3 style="font-size: 1.4rem; margin-bottom: 0.2rem;">${data.movieTitle}</h3>
                                    <p class="text-secondary"><i class="fa-solid fa-location-dot"></i> ${data.theatre}</p>
                                </div>
                                <div class="b-status">Confirmed</div>
                            </div>
                            
                            <div class="b-info-grid">
                                <div><div class="b-label">Date</div ><div class="b-value">${dateStr}</div></div>
                                <div><div class="b-label">Time</div><div class="b-value">${data.time}</div></div>
                                <div><div class="b-label">Seats</div><div class="b-value">${data.seats.join(', ')}</div></div>
                                <div><div class="b-label">Amount Paid</div><div class="b-value">$${data.finalTotal.toFixed(2)}</div></div>
                                <div><div class="b-label">Booking ID</div><div class="b-value" style="font-family: monospace;">${data.bookingId}</div></div>
                            </div>
                        </div>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
