<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movies | CineVault</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">

    <style>
        .page-header {
            padding: 120px 0 40px;
            text-align: center;
            background: linear-gradient(to bottom, rgba(5,5,5,1), rgba(17,17,17,1));
            border-bottom: 1px solid var(--border-light);
        }

        .page-title {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        /* Filters & Search */
        .filter-bar {
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            border-radius: 12px;
            margin-bottom: 3rem;
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: center;
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-glass);
        }

        .search-container {
            flex: 1;
            min-width: 250px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 0.8rem 1rem 0.8rem 2.5rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border-light);
            border-radius: 8px;
            color: white;
            transition: all var(--transition-fast);
        }

        .search-input:focus {
            border-color: var(--accent-red);
            box-shadow: 0 0 10px rgba(229,9,20,0.2);
        }

        .search-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }

        .filter-select {
            padding: 0.8rem 1rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border-light);
            border-radius: 8px;
            color: white;
            cursor: pointer;
            min-width: 120px;
        }

        .filter-select:focus {
            border-color: var(--accent-blue);
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 5rem 0;
        }
        
        .empty-icon {
            font-size: 4rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }
    </style>
</head>
<body class="page-enter">

    <!-- Navigation -->
    <nav class="navbar scrolled">
        <div class="container nav-container">
            <a href="index.html" class="nav-logo">CINE<span>VAULT</span></a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="movies.html" class="active">Movies</a>
                <a href="#">Theatres</a>
                <a href="index.html#offers">Offers</a>
                
                <div id="auth-links" style="display: flex; gap: 1rem; margin-left: 2rem;">
                    <a href="login.html" class="btn btn-outline" style="padding: 0.5rem 1rem;">Log In</a>
                    <a href="signup.html" class="btn btn-primary" style="padding: 0.5rem 1rem;">Sign Up</a>
                </div>
                
                <div id="user-links" style="display: none; align-items: center; gap: 1.5rem; margin-left: 2rem;">
                    <a href="bookings.html" class="view-all"><i class="fa-solid fa-ticket"></i> My Tickets</a>
                    <a href="#" id="logout-btn" class="text-secondary hover-glow">Logout</a>
                </div>
            </div>
            <i class="fa-solid fa-bars mobile-menu-btn"></i>
        </div>
    </nav>

    <!-- Header -->
    <header class="page-header">
        <div class="container">
            <h1 class="page-title text-gradient">Browse Movies</h1>
            <p class="text-secondary">Find your next cinematic adventure and book your perfect seat.</p>
        </div>
    </header>

    <!-- Filters & Movie Listing -->
    <section class="section">
        <div class="container">
            
            <div class="filter-bar reveal">
                <div class="search-container">
                    <i class="fa-solid fa-search search-icon"></i>
                    <input type="text" id="searchInput" class="search-input" placeholder="Search movies by title...">
                </div>
                
                <select id="genreFilter" class="filter-select">
                    <option value="all">All Genres</option>
                    <option value="Action">Action</option>
                    <option value="Sci-Fi">Sci-Fi</option>
                    <option value="Drama">Drama</option>
                    <option value="Thriller">Thriller</option>
                    <option value="Comedy">Comedy</option>
                </select>
                
                <select id="languageFilter" class="filter-select">
                    <option value="all">All Languages</option>
                    <option value="English">English</option>
                    <option value="Spanish">Spanish</option>
                    <option value="Hindi">Hindi</option>
                </select>

                <select id="sortFilter" class="filter-select">
                    <option value="latest">Latest Releases</option>
                    <option value="rating">Top Rated</option>
                    <option value="name">A - Z</option>
                </select>
            </div>

            <div id="loading" style="text-align: center; padding: 4rem 0; display: none;">
                <div class="loader"></div>
                <p class="text-secondary" style="margin-top: 1rem;">Loading blockbuster hits...</p>
            </div>

            <div class="movie-grid" id="moviesContainer">
                <!-- Movies will be injected here by movies.js -->
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom" style="margin-top: 0; padding-top: 1rem;">
                <p>&copy; 2026 CineVault Premium Movie Ticket Booking System.</p>
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script type="module" src="js/supabase.js"></script>
    <script type="module" src="js/app.js"></script>
    <script type="module" src="js/movies.js"></script>
</body>
</html>
