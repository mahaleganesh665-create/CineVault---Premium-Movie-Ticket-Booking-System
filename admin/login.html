<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | CineVault</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/animations.css">

    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: url('https://images.unsplash.com/photo-1542204165-65bf26472b9b?q=80&w=2074&auto=format&fit=crop') center/cover;
            position: relative;
        }

        .auth-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(5,5,5,0.9), rgba(15,15,15,0.8));
            backdrop-filter: blur(8px);
        }

        .auth-card {
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--accent-red); /* Admin theme red border */
            border-radius: 24px;
            padding: 3rem;
            width: 100%;
            max-width: 450px;
            position: relative;
            z-index: 10;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(229, 9, 20, 0.2);
            transform: translateY(20px);
            opacity: 0;
            animation: fadeUp 0.6s forwards;
        }

        .auth-logo {
            text-align: center;
            font-family: var(--font-heading);
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 2rem;
        }
        .auth-logo span { color: var(--accent-red); }

        .admin-badge {
            background: rgba(229, 9, 20, 0.2);
            color: var(--accent-red);
            font-size: 0.8rem;
            padding: 4px 8px;
            border-radius: 4px;
            vertical-align: middle;
            margin-left: 10px;
            font-weight: bold;
            display: inline-block;
        }

        .form-control { background: rgba(0,0,0,0.4); border-color: rgba(255,255,255,0.1); }
        .form-control:focus { background: rgba(255,255,255,0.05); border-color: var(--accent-red); }

        .btn-admin {
            background: var(--accent-red);
            color: white;
            box-shadow: 0 5px 15px rgba(229, 9, 20, 0.3);
        }
        .btn-admin:hover {
            box-shadow: 0 8px 25px rgba(229, 9, 20, 0.5);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="auth-page">
        <div class="auth-overlay"></div>
        
        <div class="auth-card">
            <div class="auth-logo">CINE<span>VAULT</span> <div class="admin-badge">ADMIN</div></div>
            <h2 style="margin-bottom: 0.5rem; text-align: center;">Staff Portal</h2>
            <p class="text-secondary" style="text-align: center; margin-bottom: 2rem; font-size: 0.9rem;">Authorised personnel only.</p>
            
            <form id="adminLoginForm">
                <div class="form-group">
                    <label class="form-label">Admin Email</label>
                    <input type="email" id="adminEmail" class="form-control" placeholder="admin@cinevault.com" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Admin Password</label>
                    <div style="position: relative;">
                        <input type="password" id="adminPassword" class="form-control" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Security Key</label>
                    <input type="password" id="securityKey" class="form-control" placeholder="Secret access key" required>
                    <small class="text-secondary" style="font-size: 0.75rem; display: block; margin-top: 5px;">* If testing locally, key is 'cineadmin'</small>
                </div>

                <button type="submit" class="btn btn-admin" style="width: 100%; margin-top: 1rem; padding: 0.8rem;" id="adminLoginBtn">
                    <i class="fa-solid fa-lock" style="margin-right: 8px;"></i> Access Dashboard
                </button>
            </form>
            
            <div style="text-align: center; margin-top: 1.5rem;">
                <a href="index.html" class="text-secondary hover-glow" style="font-size: 0.8rem;"><i class="fa-solid fa-arrow-left"></i> Back to the Main Site</a>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="../js/supabase.js"></script>
    <script type="module" src="../js/app.js"></script>
    <script type="module">
        import { supabase, USE_MOCK_DATA } from '../js/supabase.js';

        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('adminLoginBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Verifying...';
            btn.disabled = true;

            const email = document.getElementById('adminEmail').value;
            const password = document.getElementById('adminPassword').value;
            const securityKey = document.getElementById('securityKey').value;

            // Simple security key logic that you can change
            if(securityKey !== 'cineadmin') {
                if(window.showToast) window.showToast("Invalid Security Key. Access Denied.", "error");
                btn.innerHTML = originalText;
                btn.disabled = false;
                return;
            }

            if(USE_MOCK_DATA) {
                setTimeout(() => {
                    localStorage.setItem('adminSession', JSON.stringify({ email, role: 'admin' }));
                    window.location.href = 'admin.html';
                }, 1000);
                return;
            }

            try {
                // Hardcoded fallback logic for college project simplicity
                if (email === 'admin@cinevault.com' && password === 'admin123') {
                    localStorage.setItem('adminSession', JSON.stringify({ email: 'admin@cinevault.com', role: 'admin' }));
                    if(window.showToast) window.showToast("Default Admin access granted.");
                    setTimeout(() => window.location.href = 'index.html', 1000);
                    return;
                }

                // In a real Supabase setup, you'd check a "roles" table or user metadata. 
                // For now, this just logs them in exactly like a normal user but drops them in the admin dash.
                const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                if(error) throw error;
                
                // You should verify if data.user actually has admin privileges via Database here later
                localStorage.setItem('adminSession', JSON.stringify({ email: data.user.email, role: 'admin' }));
                
                if(window.showToast) window.showToast("Admin access granted.");
                setTimeout(() => window.location.href = 'index.html', 1000);
            } catch(error) {
                if(window.showToast) window.showToast(error.message, "error");
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
