<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | CineVault</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">

    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: url('https://images.unsplash.com/photo-1440407876336-62333a6f010f?q=80&w=2074&auto=format&fit=crop') center/cover;
            position: relative;
            padding: 2rem 0;
        }

        .auth-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(5,5,5,0.9), rgba(15,15,15,0.7));
            backdrop-filter: blur(5px);
        }

        .auth-card {
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-light);
            border-radius: 24px;
            padding: 3rem;
            width: 100%;
            max-width: 500px;
            position: relative;
            z-index: 10;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.1);
            transform: translateY(20px);
            opacity: 0;
            animation: fadeUp 0.6s forwards;
        }

        .auth-logo {
            text-align: center;
            font-family: var(--font-heading);
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
        }
        .auth-logo span { color: var(--accent-red); }

        .form-control { background: rgba(0,0,0,0.4); border-color: rgba(255,255,255,0.1); }
        .form-control:focus { background: rgba(255,255,255,0.05); }

        .auth-footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .auth-footer a { color: var(--accent-blue); font-weight: 500; }
        .auth-footer a:hover { text-decoration: underline; }
        
        .name-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;
        }
    </style>
</head>
<body>

    <div class="auth-page">
        <div class="auth-overlay"></div>
        
        <div class="auth-card">
            <div class="auth-logo">CINE<span>VAULT</span></div>
            <h2 style="margin-bottom: 0.5rem; text-align: center;">Create Account</h2>
            <p class="text-secondary" style="text-align: center; margin-bottom: 2rem; font-size: 0.9rem;">Join the premium cinema experience.</p>
            
            <form id="signupForm">
                <div class="name-grid">
                    <div class="form-group">
                        <label class="form-label">First Name</label>
                        <input type="text" id="fname" class="form-control" placeholder="John" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Last Name</label>
                        <input type="text" id="lname" class="form-control" placeholder="Doe" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" id="signupEmail" class="form-control" placeholder="you@example.com" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" id="signupPassword" class="form-control" placeholder="Min 6 characters" required minlength="6">
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; padding: 0.8rem;" id="signupBtn">
                    Create Account
                </button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="login.html">Sign In</a>
            </div>
            
            <div style="text-align: center; margin-top: 1rem;">
                <a href="index.html" class="text-secondary hover-glow" style="font-size: 0.8rem;"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="js/supabase.js"></script>
    <script type="module" src="js/app.js"></script>
    <script type="module" src="js/auth.js"></script>
</body>
</html>
