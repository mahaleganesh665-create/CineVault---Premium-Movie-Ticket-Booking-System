<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Success | CineVault</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">

    <style>
        .success-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem 1rem;
            position: relative;
            overflow: hidden;
        }

        .success-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(34,197,94,0.1) 0%, var(--bg-primary) 70%);
            z-index: -1;
        }

        .success-icon-wrap {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: white;
            box-shadow: 0 0 30px rgba(34,197,94,0.5);
            margin-bottom: 2rem;
            animation: scaleIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            text-align: center;
        }

        /* Digital Ticket UI */
        .ticket {
            background: white;
            color: #111;
            width: 100%;
            max-width: 800px;
            border-radius: 20px;
            display: flex;
            margin: 3rem 0;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        .ticket-left {
            flex: 2;
            padding: 2.5rem;
            border-right: 2px dashed #ccc;
            position: relative;
        }

        /* Notches for ticket */
        .ticket-left::before, .ticket-left::after {
            content: '';
            position: absolute;
            width: 40px; height: 40px;
            background: var(--bg-primary); /* Matches body background */
            border-radius: 50%;
            right: -21px; /* Center of the dashed line */
        }
        .ticket-left::before { top: -20px; }
        .ticket-left::after { bottom: -20px; }

        .ticket-right {
            flex: 1;
            background: #f8f8f8;
            padding: 2.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .ticket-title { font-size: 2rem; font-weight: 800; font-family: var(--font-heading); margin-bottom: 0.5rem; color: #111;}
        .ticket-genre { color: #666; font-size: 0.9rem; margin-bottom: 2rem; }

        .ticket-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .t-label { color: #888; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 0.2rem; }
        .t-value { font-weight: 600; font-size: 1.1rem; }

        .qr-placeholder {
            width: 150px;
            height: 150px;
            background: repeating-linear-gradient(45deg, #000 0, #000 5px, transparent 5px, transparent 10px), repeating-linear-gradient(-45deg, #000 0, #000 5px, transparent 5px, transparent 10px);
            opacity: 0.8;
            margin-bottom: 1rem;
        }

        .barcode {
            width: 100%;
            height: 40px;
            background: repeating-linear-gradient(90deg, #111 0, #111 2px, transparent 2px, transparent 4px, #111 4px, #111 8px, transparent 8px, transparent 10px);
        }

        @media (max-width: 768px) {
            .ticket { flex-direction: column; }
            .ticket-left { border-right: none; border-bottom: 2px dashed #ccc; }
            .ticket-left::before, .ticket-left::after {
                left: -20px; right: auto;
            }
            .ticket-left::before { bottom: -21px; top: auto; }
            .ticket-left::after { bottom: -21px; right: -20px; left: auto; top: auto; }
        }

        /* Print Override */
        @media print {
            body { background: white; color: black; }
            .success-icon-wrap, .btn, nav { display: none !important; }
            .ticket { box-shadow: none; border: 1px solid #ccc; }
            .ticket-left::before, .ticket-left::after { background: white; }
        }
    </style>
</head>
<body class="page-enter">

    <div class="success-bg"></div>

    <div class="success-container">
        <div class="success-icon-wrap">
            <i class="fa-solid fa-check"></i>
        </div>
        
        <h1 class="reveal stagger-1 text-gradient">Booking Confirmed!</h1>
        <p class="text-secondary reveal stagger-2">Your tickets have been sent to your email.</p>

        <!-- Ticket Card -->
        <div class="ticket reveal stagger-3" id="ticketCard" style="opacity: 0;"> <!-- JS handles reveal -->
            <div class="ticket-left">
                <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 2rem;">
                    <div>
                        <h2 class="ticket-title" id="tTitle">Movie Title</h2>
                        <div class="ticket-genre" id="tTheatre">Theatre Name</div>
                    </div>
                    <div style="text-align: right;">
                        <img id="tPoster" src="" alt="Poster" style="width: 80px; border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.2);">
                    </div>
                </div>

                <div class="ticket-grid">
                    <div>
                        <div class="t-label">Date</div>
                        <div class="t-value" id="tDate">Jan 01, 2026</div>
                    </div>
                    <div>
                        <div class="t-label">Time</div>
                        <div class="t-value" id="tTime">10:30 PM</div>
                    </div>
                    <div>
                        <div class="t-label">Seats</div>
                        <div class="t-value" id="tSeats" style="color: var(--accent-red);">A1, A2</div>
                    </div>
                    <div>
                        <div class="t-label">Total Amount</div>
                        <div class="t-value" id="tAmount">$0.00</div>
                    </div>
                </div>

                <div class="t-label">Booking ID</div>
                <div class="t-value" id="tRef" style="font-family: monospace; font-size: 1.2rem; letter-spacing: 2px;">CV123456</div>
            </div>
            
            <div class="ticket-right">
                <div class="qr-placeholder"></div>
                <div class="t-label" style="font-size: 0.7rem;">Scan at entrance</div>
                <div style="margin-top: auto; width: 100%;">
                    <div class="barcode"></div>
                </div>
            </div>
        </div>

        <div class="reveal stagger-4" style="display: flex; gap: 1rem; margin-top: 1rem;">
            <button class="btn btn-outline" onclick="window.print()"><i class="fa-solid fa-download"></i> Download Ticket</button>
            <a href="index.html" class="btn btn-primary">Back to Home</a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const dataStr = localStorage.getItem('finalTicket');
            if (dataStr) {
                const data = JSON.parse(dataStr);
                
                document.getElementById('tTitle').innerText = data.movieTitle;
                document.getElementById('tTheatre').innerText = data.theatre;
                document.getElementById('tPoster').src = data.poster;
                
                const d = new Date(data.date);
                document.getElementById('tDate').innerText = `${d.getDate()} ${d.toLocaleString('default', { month: 'short' })}, ${d.getFullYear()}`;
                document.getElementById('tTime').innerText = data.time;
                document.getElementById('tSeats').innerText = data.seats.join(', ');
                document.getElementById('tAmount').innerText = '$' + data.finalTotal.toFixed(2);
                document.getElementById('tRef').innerText = data.bookingId || 'CV' + Math.floor(Math.random()*1000000);
            }

            // Animate reveal
            setTimeout(() => {
                const ticket = document.getElementById('ticketCard');
                ticket.style.opacity = '1';
                ticket.classList.add('pulse-glow');
            }, 500);
        });
    </script>
</body>
</html>
